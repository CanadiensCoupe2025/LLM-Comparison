apiVersion: 1

datasources:
  - name: LLMeter-Postgres
    uid: llmeter_postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: llm_eval
    user: $POSTGRES_USER
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      sslmode: disable
      postgresVersion: 1600