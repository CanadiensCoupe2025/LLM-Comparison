[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# Conservative on purpose (SCRUM-25): catch real defects (pyflakes F) and import
# order (I) plus pycodestyle errors (E), without forcing a wholesale reformat of
# the existing tree. Widen later if desired.
select = ["E", "F", "I"]
# Pre-existing style we don't want the gate to churn on:
#   E501 line-length — pervasive in the current tree; cosmetic.
#   E731 lambda assignment — used deliberately in tests/fakes.
ignore = ["E501", "E731"]

[tool.coverage.run]
source = ["app"]
branch = false
omit = [
    # Placeholder container loop — no logic worth covering.
    "app/main.py",
    # Package-init re-export shims.
    "app/prompts/__init__.py",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
skip_covered = false
exclude_also = [
    # Dead-code branches we don't run today but keep for future models.
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
