- id: 0d5106637bbb41b6
  category: math
  subcategory: math
  kind: main
  source: arena-hard-v2.0
  prompt: "% 清空工作区和关闭所有图形窗口\nclear; close all; clc;\n\n% 定义全局变量\nglobal DH_params target_pos joint_inertia\
    \ joint_avg_speed;\n\n% 设置DH参数 [a, alpha, d, theta_min, theta_max]\nDH_params = [\n    300, -90, 600,\
    \ -160, 160;\n    1200, 0,   0, -150,  15;\n    300, -90,  0, -200,  80;\n    0,   -90, 1200, -180,\
    \ 180;\n    0,   -90,  0, -120, 120;\n    0,    0,   0, -180, 180\n];\n\ntarget_pos = [1500; 1200;\
    \ 200];  % 目标位置\njoint_inertia = [0.5, 0.3, 0.4, 0.6, 0.2, 0.4];  % 关节转动惯量\njoint_avg_speed = [2.0,\
    \ 1.5, 1.0, 2.5, 3.0, 2.0];  % 关节平均角速度\n\n% 设置多目标遗传算法选项\nopts = optimoptions('gamultiobj', 'PopulationSize',\
    \ 1000, 'MaxGenerations', 100, ...\n    'PlotFcn', @gaplotpareto, 'Display', 'iter');\n\n% 多启动法参数\n\
    numStarts = 5; % 启动次数\nbestSolutions = cell(numStarts, 1);\nbestFvals = cell(numStarts, 1);\n\nfor\
    \ start = 1:numStarts\n    % 运行多目标优化\n    [x, fval] = gamultiobj(@objective_function, 6, [], [], [],\
    \ [], ...\n        deg2rad(DH_params(:,4)), deg2rad(DH_params(:,5)), @constraint_function, opts);\n\
    \n    % 存储结果\n    bestSolutions{start} = x;\n    bestFvals{start} = fval;\n    \n    % 可视化每次运行的结果\n\
    \    visualize_results(fval);\n    disp_results(x, fval);\nend\n\n% 比较所有结果，找到全局最优解\nglobalBestFval\
    \ = [inf, inf];\nglobalBestSolution = [];\n\nfor i = 1:numStarts\n    % 找到最小误差的解\n    [minError, idx]\
    \ = min(bestFvals{i}(:,1));\n    if minError < globalBestFval(1) || (minError == globalBestFval(1)\
    \ && bestFvals{i}(idx,2) < globalBestFval(2))\n        globalBestFval = bestFvals{i}(idx,:);\n   \
    \     globalBestSolution = bestSolutions{i}(idx,:);\n    end\nend\n\n% 显示全局最优解\ndisp('全局最优解 - 关节角度\
    \ (度):');\ndisp(array2table(rad2deg(globalBestSolution), 'VariableNames', {'Joint1', 'Joint2', 'Joint3',\
    \ 'Joint4', 'Joint5', 'Joint6'}));\ndisp('全局最优解 - 目标函数值:');\ndisp(array2table(globalBestFval, 'VariableNames',\
    \ {'EndEffectorError_mm_', 'EnergyConsumption_J_'}));\n\n\n% 目标函数：最小化末端误差和能耗\nfunction f = objective_function(theta)\n\
    \    global target_pos joint_inertia joint_avg_speed;\n    [end_pos, ~] = forward_kinematics(theta);\n\
    \    f(1) = norm(end_pos - target_pos);  % 末端误差\n    \n    mass = 5; g = 9.81;  % 质量和重力加速度\n    gravitational_energy\
    \ = sum(mass * g * forward_kinematics(theta));  % 重力势能\n    \n    f(2) = sum(joint_inertia .* (joint_avg_speed\
    \ .* theta).^2) + gravitational_energy;  % 总能耗\nend\n\n% 约束函数：限制末端误差不超过200mm\nfunction [c, ceq] =\
    \ constraint_function(theta)\n    global target_pos;\n    [end_pos, ~] = forward_kinematics(theta);\n\
    \    c = norm(end_pos - target_pos) - 200;\n    ceq = [];\nend\n\n% 正向运动学计算\nfunction [end_pos, T]\
    \ = forward_kinematics(theta)\n    global DH_params;\n    T = eye(4);\n    for i = 1:6\n        T\
    \ = T * dh_matrix(DH_params(i,:), theta(i));\n    end\n    end_pos = T(1:3,4);\nend\n\n% DH矩阵计算\n\
    function T = dh_matrix(params, theta)\n    a = params(1); alpha = deg2rad(params(2)); d = params(3);\n\
    \    T = [\n        cos(theta), -sin(theta)*cos(alpha),  sin(theta)*sin(alpha), a*cos(theta);\n  \
    \      sin(theta),  cos(theta)*cos(alpha), -cos(theta)*sin(alpha), a*sin(theta);\n        0,     \
    \      sin(alpha),             cos(alpha),            d;\n        0,           0,                \
    \      0,                     1\n    ];\nend\n\n% 更新 visualize_results 和 disp_results 函数\nfunction\
    \ visualize_results(fval)\n    figure('Name', 'Pareto Fronts', 'NumberTitle', 'off');\n    scatter(fval(:,1),\
    \ fval(:,2), 'filled');\n    xlabel('End Effector Error (mm)');\n    ylabel('Energy Consumption (J)');\n\
    \    title('Pareto Fronts');\n    grid on;\nend\n\nfunction disp_results(x, fval)\n    % 显示最高能耗点，最低误差点，以及均衡点相应的角度及数值\n\
    \    [minError, minErrorIdx] = min(fval(:,1));\n    [maxEnergy, maxEnergyIdx] = max(fval(:,2));\n\
    \    \n    disp('最高能耗点 - 关节角度 (度):');\n    disp(array2table(rad2deg(x(maxEnergyIdx,:)), 'VariableNames',\
    \ {'Joint1', 'Joint2', 'Joint3', 'Joint4', 'Joint5', 'Joint6'}));\n    disp('最高能耗点 - 目标函数值:');\n \
    \   disp(array2table([minError, fval(maxEnergyIdx,2)], 'VariableNames', {'EndEffectorError_mm_', 'EnergyConsumption_J_'}));\n\
    \n    disp('最低误差点 - 关节角度 (度):');\n    disp(array2table(rad2deg(x(minErrorIdx,:)), 'VariableNames',\
    \ {'Joint1', 'Joint2', 'Joint3', 'Joint4', 'Joint5', 'Joint6'}));\n    disp('最低误差点 - 目标函数值:');\n \
    \   disp(array2table([minError, fval(maxEnergyIdx,2)], 'VariableNames', {'EndEffectorError_mm_', 'EnergyConsumption_J_'}));\n\
    \n    % 找到能量和误差均衡的点\n    balancedIdx = find(fval(:,1) <= 1.1 * minError\n修改代码去bug"
  expected:
    check: judge
