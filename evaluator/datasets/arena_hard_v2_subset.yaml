  kind: main
  source: arena-hard-v2.0
  prompt: "class FeaturePenalizer(BasePenalizer):\n    \"\"\"\n    Feature penalization with TensorFlow.\n\
    \n    Source (by jrb): https://github.com/jonrtaylor/twitch/blob/master/FE_Clipping_Script.ipynb\n\
    \n    Source of first PyTorch implementation (by Michael Oliver / mdo): https://forum.numer.ai/t/model-diagnostics-feature-exposure/899/12\n\
    \n    :param max_exposure: Number in range [0...1] indicating how much to reduce max feature exposure\
    \ to.\n    :param pred_name: Prediction column name. Used for new column name. \\n\n    :param suffix:\
    \ Optional suffix that is added to new column name.\n    \"\"\"\n    def __init__(\n\n        self,\n\
    \        max_exposure: float,\n        pred_name: str = \"prediction\",\n        suffix: str = None,\n\
    \    ):\n        self.max_exposure = max_exposure\n        self.pred_name = pred_name\n        assert\
    \ (\n            0.0 <= max_exposure <= 1.0\n        ), f\"'max_exposure' should be a float in range\
    \ [0...1]. Got '{self.max_exposure}'.\"\n        new_col_name = (\n            f\"{self.pred_name}_penalized_{self.max_exposure}_{suffix}\"\
    \n            if suffix\n            else f\"{self.pred_name}_penalized_{self.max_exposure}\"\n  \
    \      )\n        super().__init__(new_col_name=new_col_name)\n        self.suffix = suffix\n\n  \
    \  def transform(self, X: pd.DataFrame, features: pd.DataFrame, era_series: pd.Series) -> np.array:\n\
    \        \"\"\"\n        Main transform method.\n        :param X: Input predictions to neutralize.\
    \ \n        :param features: DataFrame with features for neutralization. \n        :param era_series:\
    \ Series with era labels for each row in features. \n        Features, eras and the prediction column\
    \ must all have the same length.\n        :return: Penalized predictions.\n        \"\"\"\n      \
    \  assert len(X) == len(features), \"Input predictions must have same length as features.\"\n    \
    \    assert len(X) == len(era_series), \"Input predictions must have same length as eras.\"\n    \
    \    df = features.copy()\n        df[\"prediction\"] = X\n        df[\"era\"] = era_series\n    \
    \    penalized_data = self._reduce_all_exposures(\n            dataf=df, column=self.pred_name, neutralizers=list(features.columns)\n\
    \        )\n        return penalized_data\n\n    def _reduce_all_exposures(\n        self,\n     \
    \   dataf: pd.DataFrame,\n        column: str = \"prediction\",\n        neutralizers: list = None,\n\
    \        normalize=True,\n        gaussianize=True,\n    ) -> pd.DataFrame:\n        neutralized =\
    \ []\n\n        for era in tqdm(dataf[\"era\"].unique()):\n            dataf_era = dataf[dataf[\"\
    era\"] == era]\n            scores = dataf_era[[column]].values\n            exposure_values = dataf_era[neutralizers].values\n\
    \n            if normalize:\n                scores2 = []\n                for x in scores.T:\n  \
    \                  x = (scipy.stats.rankdata(x, method=\"ordinal\") - 0.5) / len(x)\n            \
    \        if gaussianize:\n                        x = scipy.stats.norm.ppf(x)\n                  \
    \  scores2.append(x)\n                scores = np.array(scores2)[0]\n\n            scores, _ = self._reduce_exposure(\n\
    \                scores, exposure_values, len(neutralizers), None\n            )\n\n            scores\
    \ /= tf.math.reduce_std(scores)\n            scores -= tf.reduce_min(scores)\n            scores /=\
    \ tf.reduce_max(scores)\n            neutralized.append(scores.numpy())\n\n        predictions = pd.DataFrame(\n\
    \            np.concatenate(neutralized), columns=[column], index=dataf.index\n        )\n       \
    \ return predictions\n\n    def _reduce_exposure(self, prediction, features, input_size=50, weights=None):\n\
    \        model = tf.keras.models.Sequential(\n            [\n                tf.keras.layers.Input(input_size),\n\
    \                tf.keras.experimental.LinearModel(use_bias=False),\n            ]\n        )\n  \
    \      feats = tf.convert_to_tensor(features - 0.5, dtype=tf.float32)\n        pred = tf.convert_to_tensor(prediction,\
    \ dtype=tf.float32)\n        if weights is None:\n            optimizer = tf.keras.optimizers.Adamax()\n\
    \            start_exp = self.__exposures(feats, pred[:, None])\n            target_exps = tf.clip_by_value(\n\
    \                start_exp, -self.max_exposure, self.max_exposure\n            )\n            self._train_loop(model,\
    \ optimizer, feats, pred, target_exps)\n        else:\n            model.set_weights(weights)\n  \
    \      return pred[:, None] - model(feats), model.get_weights()\n\n    def _train_loop(self, model,\
    \ optimizer, feats, pred, target_exps):\n        for _ in range(1000000):\n            loss, grads\
    \ = self.__train_loop_body(model, feats, pred, target_exps)\n            optimizer.apply_gradients(zip(grads,\
    \ model.trainable_variables))\n            if loss < 1e-7:\n                break\n\n    def __train_loop_body(self,\
    \ model, feats, pred, target_exps):\n        with tf.GradientTape() as tape:\n            exps = self.__exposures(feats,\
    \ pred[:, None] - model(feats, training=True))\n            loss = tf.reduce_sum(\n              \
    \  tf.nn.relu(tf.nn.relu(exps) - tf.nn.relu(target_exps))\n                + tf.nn.relu(tf.nn.relu(-exps)\
    \ - tf.nn.relu(-target_exps))\n            )\n        return loss, tape.gradient(loss, model.trainable_variables)\n\
    \n    @staticmethod\n    def __exposures(x, y):\n        x = x - tf.math.reduce_mean(x, axis=0)\n\
    \        x = x / tf.norm(x, axis=0)\n        y = y - tf.math.reduce_mean(y, axis=0)\n        y = y\
    \ / tf.norm(y, axis=0)\n        return tf.matmul(x, y, transpose_a=True)\n---\n\nimport os\nimport\
    \ pathlib\nimport numpy as np\nimport pandas as pd\nimport scipy.stats\nimport tensorflow as tf\n\
    import joblib\nfrom tqdm.notebook import tqdm\n\nNUMERAI_S3_BUCKET_URL = \"https://numerai-public-datasets.s3-us-west-2.amazonaws.com\"\
    \n\n#read in the example predictions from local storage\n#EXAMPLE_PREDS = 'tournament_predictions.csv'\n\
    \n#or downlod the example predictions from Numerai's S3 bucket:\nEXAMPLE_PREDS_URL = NUMERAI_S3_BUCKET_URL\
    \ + \"/latest_numerai_example_predictions_data.csv.xz\"\n\n#download the latest tournament data file:\n\
    TOURNAMENT_DATA_URL = NUMERAI_S3_BUCKET_URL + \"/latest_numerai_tournament_data.csv.xz\"\n\n###IMPORTANT!\
    \ DELETE THE FILE BELOW IF YOU CHANGE MODELS! OTHERWISE, RENAME THE FILE FOR YOUR VARIOUS MODELS###\n\
    LM_CACHE_FILE = pathlib.Path(\"neutralization.cache.joblib\")\n\n@tf.function(experimental_relax_shapes=True,\
    \ experimental_compile=True)\ndef exposures(x, y):\n    x = x - tf.math.reduce_mean(x, axis=0)\n \
    \   x = x / tf.norm(x, axis=0)\n    y = y - tf.math.reduce_mean(y, axis=0)\n    y = y / tf.norm(y,\
    \ axis=0)\n    return tf.matmul(x, y, transpose_a=True)\n\n@tf.function(experimental_relax_shapes=True)\n\
    def train_loop_body(model, feats, pred, target_exps):\n    with tf.GradientTape() as tape:\n     \
    \   exps = exposures(feats, pred[:, None] - model(feats, training=True))\n        loss = tf.reduce_sum(tf.nn.relu(tf.nn.relu(exps)\
    \ - tf.nn.relu(target_exps)) +\n                             tf.nn.relu(tf.nn.relu(-exps) - tf.nn.relu(-target_exps)))\n\
    \    return loss, tape.gradient(loss, model.trainable_variables)\n\ndef train_loop(model, optimizer,\
    \ feats, pred, target_exps, era):\n    for i in range(1000000):\n        loss, grads = train_loop_body(model,\
    \ feats, pred, target_exps)\n        optimizer.apply_gradients(zip(grads, model.trainable_variables))\n\
