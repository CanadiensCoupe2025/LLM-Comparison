# ─────────────────────────────────────────────────────────────
# Sprint 1 — Smoke test (SCRUM-21)
# ─────────────────────────────────────────────────────────────
# Un seul cas pour valider de bout en bout :
#   prompt → llm_client → 6 modèles → runner → Postgres
#
# Consommé par :
#   python runner.py --dataset evaluator/datasets/sprint1_smoke.yaml \
#                    --models <keys>
#
# Le runner d'aujourd'hui ne vérifie pas `expected`, mais on garde
# le champ pour réutilisation par SCRUM-23 (LLM-as-judge).
# ─────────────────────────────────────────────────────────────

dataset:
  name: sprint1_smoke
  version: 1
  description: >
    Cas unique de validation end-to-end pour l'épopée SCRUM-10.
    Question factuelle simple, réponse vérifiable d'un coup d'œil.

defaults:
  temperature: 0
  max_tokens: 256

cases:
  - id: smoke-capital-canada
    category: factual
    kind: canary
    prompt: "Quelle est la capitale du Canada ?"
    expected:
      check: contains
      value: ["Ottawa"]
      threshold: 1.0
    rationale: >
      Smoke SCRUM-21 — chaque modèle doit identifier Ottawa.
      Réponse déterministe, peu de tokens, coût négligeable.
